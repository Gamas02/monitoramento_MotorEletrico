version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: motor-eletrico
    restart: always
    env_file:
      - .env
    depends_on:
      - mysql
    ports:
      - "5060:5060"